name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv venv
          uv sync --all-extras

      - name: Run linting
        run: |
          uv run ruff check src/

      - name: Run tests
        env:
          FORTIANALYZER_HOST: "ci-dummy.local"
        run: |
          uv run pytest tests/ --ignore=tests/integration -v --tb=short

      - name: Run tests with coverage
        env:
          FORTIANALYZER_HOST: "ci-dummy.local"
        run: |
          uv run pytest tests/ --ignore=tests/integration --cov=src/fortianalyzer_mcp --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@f2274c2c340e0c81c8f7dc407b2a477b8935f171 # v6
        if: matrix.python-version == '3.12'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv venv
          uv sync --all-extras

      - name: Check formatting
        run: |
          uv run ruff format --check src/ tests/

      - name: Check linting
        run: |
          uv run ruff check src/ tests/

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv venv
          uv sync --all-extras

      - name: Dependency vulnerability audit (pip-audit)
        run: |
          uv run --with pip-audit -- pip-audit --desc

      - name: Static security analysis (bandit)
        run: |
          uv run --with bandit -- bandit -r src/ -ll -ii
